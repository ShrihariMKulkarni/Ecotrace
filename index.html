<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#060d09">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- SEO -->
  <title>EcoTrace — Personal Carbon Footprint Tracker</title>
  <meta name="description" content="Track your daily carbon footprint, discover personalized insights, and take action to reduce your impact. Like a fitness app, but for the planet.">
  <meta name="keywords" content="carbon footprint, sustainability, climate action, eco tracker, CO2, carbon calculator, India">
  
  <!-- Open Graph -->
  <meta property="og:title" content="EcoTrace — Personal Carbon Footprint Tracker">
  <meta property="og:description" content="Track your daily carbon footprint and take action to reduce your impact. Like a fitness app, but for the planet.">
  <meta property="og:type" content="website">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">

  <!-- Favicon (emoji-based inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
</head>
<body>
  <!-- App Mount Point -->
  <div id="app"></div>

  <!-- Scripts (order matters — dependencies first) -->
  <!-- Utilities -->
  <script src="js/utils/storage.js"></script>
  <script src="js/utils/formatter.js"></script>
  
  <!-- Data -->
  <script src="js/data/emission-factors.js"></script>
  <script src="js/data/challenges.js"></script>
  
  <!-- Calculator (depends on EmissionFactors) -->
  <script src="js/utils/calculator.js"></script>
  
  <!-- Models (depend on Storage, Formatter, Calculator) -->
  <script src="js/models/user-profile.js"></script>
  <script src="js/models/activity-log.js"></script>
  <script src="js/models/achievements.js"></script>
  
  <!-- Components -->
  <script src="js/components/charts.js"></script>
  <script src="js/components/animations.js"></script>
  
  <!-- Views (depend on all above) -->
  <script src="js/views/onboarding.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/tracker.js"></script>
  <script src="js/views/insights.js"></script>
  <script src="js/views/challenges.js"></script>
  <script src="js/views/learn.js"></script>
  
  <!-- App Controller (last — initializes everything) -->
  <script src="js/app.js"></script>
</body>
</html>
